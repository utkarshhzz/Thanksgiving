[alembic]
# Path to the migration scripts folder
script_location = alembic

# Template used to generate new migration file names
# %(year)d-%(month).2d-%(day).2d is the date, %(rev)s is the revision ID
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Prepend sys.path with this value on startup
# "." means the backend/ directory — so Python can import "app.core.config" etc.
prepend_sys_path = .

# Timezone for migration timestamps
timezone = UTC

# Do NOT set sqlalchemy.url here — we set it dynamically in env.py
# from our Settings class (so secrets stay in .env, not in this file)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
