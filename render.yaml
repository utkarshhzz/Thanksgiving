services:
  # ── Backend: FastAPI ──────────────────────────────────────────────────────────
  - type: web
    name: thanksgiving-api
    runtime: python
    region: singapore
    rootDir: backend
    # buildCommand runs once at deploy time:
    # 1. Install all Python packages from requirements.txt
    # 2. Run database migrations (alembic upgrade head)
    #    This is safe to run on every deploy — alembic only applies NEW migrations.
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    # startCommand launches the actual server (PORT is set by Render automatically)
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # SECRET_KEY: Render auto-generates a secure 32-char random string
      - key: SECRET_KEY
        generateValue: true
      # DATABASE_URL: Automatically injected from the Postgres database below
      - key: DATABASE_URL
        fromDatabase:
          name: thanksgiving-db
          property: connectionString
      # JWT settings
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "90"
      # Set these manually in Render dashboard after first deploy:
      - key: GOOGLE_CLIENT_ID
        sync: false
      # ALLOWED_ORIGINS = your frontend Render URL, e.g. https://thanksgiving-app.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false

  # ── Frontend: Vite/React (served as static files) ────────────────────────────
  - type: web
    name: thanksgiving-app
    runtime: static
    region: singapore
    rootDir: frontend
    # Install npm packages and build the production bundle
    buildCommand: npm install && npm run build
    # The folder Vite outputs to (vite.config.js build.outDir default)
    staticPublishPath: dist
    routes:
      # Critical: rewrite ALL paths to index.html so React Router works.
      # Without this, refreshing on /dashboard would return a 404 from Render.
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Your backend Render URL — set after backend is deployed
      # e.g. https://thanksgiving-api.onrender.com/api/v1
      - key: VITE_API_URL
        sync: false
      # Same Google Client ID as backend
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false

# ── PostgreSQL Database ────────────────────────────────────────────────────────
databases:
  - name: thanksgiving-db
    databaseName: thanksgiving
    plan: free
    region: singapore
