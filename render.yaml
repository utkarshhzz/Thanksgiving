services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: thanksgiving-api
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true           # Render auto-generates a secure secret
      - key: DATABASE_URL
        fromDatabase:
          name: thanksgiving-db
          property: connectionString
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "90"
      - key: GOOGLE_CLIENT_ID
        sync: false                   # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false                   # Set to your Render frontend URL after deploy
      - key: ALLOWED_ORIGINS
        sync: false                   # Same as FRONTEND_URL

  # ── Frontend (Vite / React) ───────────────────────────────────────────────
  - type: web
    name: thanksgiving-app
    runtime: static
    region: singapore
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # All paths → index.html so React Router handles client-side routing
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false                   # e.g. https://thanksgiving-api.onrender.com/api/v1
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false                   # Your Google OAuth Client ID

databases:
  - name: thanksgiving-db
    databaseName: thanksgiving
    plan: free
    region: singapore
